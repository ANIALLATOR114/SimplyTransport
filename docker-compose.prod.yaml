version: "3.8"

services:
  app:
    extends:
      file: Docker/app/docker-compose.yaml
      service: simplytransport
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      timescale:
        condition: service_started
      opentelemetry-collector:
        condition: service_started

  postgres:
    extends:
      file: Docker/postgres/docker-compose.yaml
      service: postgres

  redis:
    extends:
      file: Docker/redis/docker-compose.yaml
      service: redis

  timescale:
    extends:
      file: Docker/timescale/docker-compose.yaml
      service: timescale

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.0
    container_name: aspire-dashboard
    environment:
      ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
    restart: unless-stopped
    networks:
      - simplytransport-network

  opentelemetry-collector:
    extends:
      file: Docker/otel-collector/docker-compose.yaml
      service: opentelemetry-collector
    depends_on:
      - aspire-dashboard

networks:
  simplytransport-network:
    name: simplytransport-network
