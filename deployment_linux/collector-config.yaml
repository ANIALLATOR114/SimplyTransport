# Forwards all OTLP signals to Aspire Dashboard (gRPC).
# Aspire 9.x listens for OTLP/gRPC on port 18889 inside the container (UI is 18888).
# Example on Docker network: ASPIRE_OTLP_ENDPOINT=aspire-dashboard:18889

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp/aspire:
    endpoint: ${ASPIRE_OTLP_ENDPOINT}
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/aspire]
