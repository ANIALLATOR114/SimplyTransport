{% extends "base.html" %}
{% block title %}
    {{ request.app.openapi_config.title }} — {{ map_type }}
{% endblock title %}
{% block content %}
    <div class="inner-container inner-container-expand">
        <h1>Stops — {{ map_type }}</h1>
        <div class="map-container map-container--maplibre"
             data-map-type="{{ map_type }}">
            <div id="map-element"></div>
            <img class="map-loader"
                 id="map-loader"
                 src="/static/loader.svg"
                 width="100%"
                 height="80px"
                 alt="Loading spinner">
        </div>
    </div>
    <script src="/static/js/stop-detail-popup.js?{{ request.app.openapi_config.version }}"></script>
    <script src="/static/js/static-stop-map.js?{{ request.app.openapi_config.version }}"></script>
{% endblock content %}
