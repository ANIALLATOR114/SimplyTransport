<div class="map-container map-container--maplibre"
     data-stop-id="{{ stop.id }}">
    <div id="map-element"></div>
    <button type="button"
            class="pagination-button"
            id="stop-map-refresh">Refresh</button>
    <img class="map-loader"
         id="map-loader"
         src="/static/loader.svg"
         width="100%"
         height="80px"
         alt="Loading spinner">
</div>
<script src="/static/js/stop-map.js?{{ request.app.openapi_config.version }}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const wrap = document.querySelector(".map-container--maplibre[data-stop-id]");
        if (wrap && window.initStopMap) {
            initStopMap(wrap.dataset.stopId, "map-element");
        }
        const refBtn = document.getElementById("stop-map-refresh");
        if (refBtn) {
            refBtn.addEventListener("click", function () {
                window.location.reload();
            });
        }
    });
</script>
