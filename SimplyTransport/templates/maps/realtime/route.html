<div class="map-container map-container--maplibre"
     data-route-id="{{ route.id }}"
     data-direction="{{ direction.value }}">
    <div id="map-element"></div>
    <button type="button"
            class="pagination-button"
            id="route-map-refresh">Refresh</button>
    <img class="map-loader"
         id="map-loader"
         src="/static/loader.svg"
         width="100%"
         height="80px"
         alt="Loading spinner">
</div>
<script src="/static/js/route-map.js?{{ request.app.openapi_config.version }}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const wrap = document.querySelector(".map-container--maplibre[data-route-id][data-direction]");
        if (wrap && window.initRouteMap) {
            initRouteMap(wrap.dataset.routeId, wrap.dataset.direction, "map-element");
        }
        const refBtn = document.getElementById("route-map-refresh");
        if (refBtn) {
            refBtn.addEventListener("click", function () {
                window.location.reload();
            });
        }
    });
</script>
