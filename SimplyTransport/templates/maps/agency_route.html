{% extends "base.html" %}
{% block title %}
    {{ request.app.openapi_config.title }} - {{ agency.name }} Routes
{% endblock title %}
{% block content %}
    <h1>{{ agency.name }}</h1>
    {% if error %}
        <h3>{{ error }}</h3>
    {% else %}
        <div class="inner-container inner-container-expand">
            <div class="map-container map-container--maplibre"
                 data-agency-id="{{ agency.id }}">
                <div id="map-element"></div>
                <img class="map-loader"
                     id="map-loader"
                     src="/static/loader.svg"
                     width="100%"
                     height="80px"
                     alt="Loading spinner">
            </div>
        </div>
        <script src="/static/js/agency-map.js?{{ request.app.openapi_config.version }}"></script>
    {% endif %}
{% endblock content %}
