<style>
.popuptext {
    visibility: hidden;
    max-width: min(90vw, 22rem);
    background-color: #555;
    color: var(--font-color);
    text-align: center;
    border-radius: 6px;
    padding: 0.5rem;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    box-sizing: border-box;
    pointer-events: auto;
}

.popuptext::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    margin-left: -5px;
    border-width: 5px;
    border-style: solid;
    border-color: #555 transparent transparent transparent;
}

.copy-popup-below::after {
    top: auto;
    bottom: 100%;
    border-color: transparent transparent #555 transparent;
}

.show-popup {
    visibility: visible;
    -webkit-animation: fadeIn 0.5s;
    animation: fadeIn 0.5s;
}

@-webkit-keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}
</style>
<script>
var copyPopupHideTimeout = null;

function positionCopyPopup(popup, anchorEl) {
    if (!anchorEl) {
        return;
    }
    var rect = anchorEl.getBoundingClientRect();
    var gap = 8;
    popup.style.left = Math.round(rect.left + rect.width / 2) + "px";
    popup.style.top = Math.round(rect.top - gap) + "px";
    popup.style.transform = "translate(-50%, -100%)";
    popup.classList.remove("copy-popup-below");
}

function copyTableToClipboard(copyAsCode = true, tableId = null, anchorEl = null) {
    const table = tableId
        ? document.getElementById(tableId)
        : document.querySelector('.table-search');
    if (!table) {
        console.error(tableId ? `Table with ID ${tableId} not found.` : 'No .table-search table found.');
        return;
    }
    const headerCells = table.querySelectorAll('thead th');
    const bodyRows = table.querySelectorAll('tbody tr');

    const maxRows = 15;
    const rows = [];

    // Extract header
    const header = Array.from(headerCells).map(cell => cell.innerText.trim());
    rows.push(header);

    // Extract body rows
    for (let i = 0; i < Math.min(bodyRows.length, maxRows); i++) {
        const cells = bodyRows[i].querySelectorAll('td');
        const row = Array.from(cells).map(cell => cell.innerText.trim());
        rows.push(row);
    }

    // Determine column widths
    const colWidths = header.map((_, colIndex) => {
        return Math.max(...rows.map(row => row[colIndex].length));
    });

    // Format rows with vertical bars and aligned columns
    const formattedRows = rows.map(row => {
        return row.map((cell, colIndex) => cell.padEnd(colWidths[colIndex])).join(' | ');
    });

    var formattedTable = '';
    if (copyAsCode) {
        formattedTable = '```\n' + formattedRows.join('\n') + '\n```';
    }
    else {
        formattedTable = formattedRows.join('\n');
    }

    // Copy formatted table to clipboard
    const tempContainer = document.createElement('textarea');
    tempContainer.value = formattedTable;
    document.body.appendChild(tempContainer);
    tempContainer.select();
    document.execCommand('copy');
    document.body.removeChild(tempContainer);

    var popup = document.getElementById("copyPopup");
    if (copyPopupHideTimeout) {
        clearTimeout(copyPopupHideTimeout);
        copyPopupHideTimeout = null;
    }
    positionCopyPopup(popup, anchorEl);
    popup.classList.add("show-popup");
    if (anchorEl) {
        requestAnimationFrame(function () {
            var pr = popup.getBoundingClientRect();
            if (pr.top < 4) {
                var r = anchorEl.getBoundingClientRect();
                var g = 8;
                popup.style.top = Math.round(r.bottom + g) + "px";
                popup.style.transform = "translate(-50%, 0)";
                popup.classList.add("copy-popup-below");
                pr = popup.getBoundingClientRect();
            }
            var ar = anchorEl.getBoundingClientRect();
            var cx = ar.left + ar.width / 2;
            var halfW = pr.width / 2;
            var minX = 8 + halfW;
            var maxX = window.innerWidth - 8 - halfW;
            if (minX <= maxX) {
                var left = Math.min(maxX, Math.max(minX, cx));
                popup.style.left = Math.round(left) + "px";
            }
        });
    }

    copyPopupHideTimeout = setTimeout(hidePopup, 5000);
}

function hidePopup() {
    var popup = document.getElementById("copyPopup");
    if (copyPopupHideTimeout) {
        clearTimeout(copyPopupHideTimeout);
        copyPopupHideTimeout = null;
    }
    popup.classList.remove("show-popup");
    popup.classList.remove("copy-popup-below");
    popup.style.left = "";
    popup.style.top = "";
    popup.style.transform = "";
}
</script>
